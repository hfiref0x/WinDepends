name: Build WinDepends and WinDepends.Core

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore WinDepends
        run: dotnet restore src\WinDepends.sln

      - name: Publish WinDepends
        run: >
          dotnet publish src\WinDepends\WinDepends.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -p:Platform=${{ env.PLATFORM }}
          --no-restore
          -o Package\Publish\WinDepends

      - name: Build WinDepends.Core
        run: >
          msbuild src\WinDepends.Core\WinDepends.Core.vcxproj
          /m
          /p:Platform=${{ env.PLATFORM }}
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /p:PlatformToolset=v143

      - name: Collect files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Package\Files | Out-Null
          New-Item -ItemType Directory -Force -Path Package\Pdbs | Out-Null

          $frontendPublishOut = "Package\Publish\WinDepends"
          $backendOut = "src\WinDepends.Core\output\${{ env.PLATFORM }}\${{ env.BUILD_CONFIGURATION }}"

          Copy-Item "$frontendPublishOut\WinDepends.exe" "Package\Files\WinDepends.exe" -Force
          Copy-Item "$backendOut\WinDepends.Core.x64.exe" "Package\Files\WinDepends.Core.x64.exe" -Force

          if (Test-Path "$frontendPublishOut\WinDepends.pdb") {
            Copy-Item "$frontendPublishOut\WinDepends.pdb" "Package\Pdbs\WinDepends.pdb" -Force
          }

          if (Test-Path "$backendOut\WinDepends.Core.x64.pdb") {
            Copy-Item "$backendOut\WinDepends.Core.x64.pdb" "Package\Pdbs\WinDepends.Core.x64.pdb" -Force
          }

      - name: Pack binaries
        shell: pwsh
        working-directory: Package\Files
        run: Compress-Archive -Path * -DestinationPath ..\..\WinDepends_snapshot.zip -Force

      - name: Pack PDBs
        shell: pwsh
        working-directory: Package\Pdbs
        run: Compress-Archive -Path * -DestinationPath ..\..\WinDepends_snapshot_pdbs.zip -Force

      - name: Upload binaries archive
        uses: actions/upload-artifact@v6
        with:
          name: WinDepends_snapshot
          path: WinDepends_snapshot.zip

      - name: Upload symbols archive
        uses: actions/upload-artifact@v6
        with:
          name: WinDepends_snapshot_pdbs
          path: WinDepends_snapshot_pdbs.zip
          

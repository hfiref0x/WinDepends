name: Build WinDepends and WinDepends.Core

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore WinDepends
        run: dotnet restore src\WinDepends.sln

      - name: Publish WinDepends
        run: >
          dotnet publish src\WinDepends\WinDepends.csproj
          -c ${{ env.BUILD_CONFIGURATION }}
          -p:Platform=${{ env.PLATFORM }}
          -p:PublishProfile=FolderProfile
          --no-restore

      - name: Build WinDepends.Core
        run: >
          msbuild src\WinDepends.Core\WinDepends.Core.vcxproj
          /m
          /p:Platform=${{ env.PLATFORM }}
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /p:PlatformToolset=v143

      - name: Collect application files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Package\Application | Out-Null

          $frontendPublishOut = "src\WinDepends\bin\publish\win-x64"
          $backendOut = "src\WinDepends.Core\output\${{ env.PLATFORM }}\${{ env.BUILD_CONFIGURATION }}"

          if (!(Test-Path "$frontendPublishOut\WinDepends.exe")) {
            throw "Published WinDepends.exe not found in $frontendPublishOut"
          }

          if (!(Test-Path "$backendOut\WinDepends.Core.x64.exe")) {
            throw "WinDepends.Core.x64.exe not found in $backendOut"
          }

          Copy-Item "$frontendPublishOut\WinDepends.exe" "Package\Application" -Force
          Copy-Item "$backendOut\WinDepends.Core.x64.exe" "Package\Application" -Force

      - name: Collect PDB files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Package\PDBs | Out-Null

          $frontendPublishOut = "src\WinDepends\bin\publish\win-x64"
          $backendOut = "src\WinDepends.Core\output\${{ env.PLATFORM }}\${{ env.BUILD_CONFIGURATION }}"

          if (Test-Path "$frontendPublishOut\WinDepends.pdb") {
            Copy-Item "$frontendPublishOut\WinDepends.pdb" "Package\PDBs" -Force
          }

          if (Test-Path "$backendOut\WinDepends.Core.x64.pdb") {
            Copy-Item "$backendOut\WinDepends.Core.x64.pdb" "Package\PDBs" -Force
          }

      - name: Upload WinDepends snapshot
        uses: actions/upload-artifact@v6
        with:
          name: WinDepends_snapshot
          path: Package\Application\*

      - name: Upload WinDepends PDBs
        uses: actions/upload-artifact@v6
        with:
          name: WinDepends_snapshot_pdbs
          path: Package\PDBs\*
